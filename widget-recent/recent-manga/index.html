<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #0f1117;
  color: #e6edf3;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

#feed {
  display: flex;
  flex-direction: column;
}

/* row */
.item {
  display: flex;
  gap: 12px;
  padding: 12px;
  position: relative;
  background: linear-gradient(90deg, #0f1722, #111827);
  border-bottom: 1px solid #1f2933;
}

/* left status bar */
.item::before {
  content: "";
  position: absolute;
  left: 0;
  top: 6px;
  bottom: 6px;
  width: 5px;
  border-radius: 6px;
  background: var(--color);
}

/* cover */
.cover {
  width: 48px;
  height: 68px;
  border-radius: 6px;
  object-fit: cover;
}

/* content */
.content {
  flex: 1;
}

/* title */
.title {
  font-size: 14px;
  font-weight: 600;
  color: #8ab4f8;
  text-decoration: none;
}

/* meta */
.meta {
  font-size: 12px;
  color: #9aa4b2;
}

/* progress bar */
.progress {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 3px;
  background: #2a2f36;
}

.progress-inner {
  height: 100%;
  background: var(--color);
}
</style>
</head>

<body>

<div id="feed">Loading...</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  const container = document.getElementById("feed");

  const rss = "https://myanimelist.net/rss.php?type=rm&u=nekoneko1234";
  const api = "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(rss);

  const statusColors = {
    "Reading": "#2ea043",
    "Completed": "#1f6feb",
    "On-Hold": "#d29922",
    "Dropped": "#f85149",
    "Plan to Read": "#8b949e"
  };

  try {
    const res = await fetch(api);
    const data = await res.json();

    container.innerHTML = "";

    const seen = new Set();
    let count = 0;

    for (const item of data.items) {

      // parse description ONLY
      const desc = item.description;

      const match = desc.match(/(Reading|Completed|On-Hold|Dropped|Plan to Read)\s*-\s*(\d+)\s*of\s*(\d+|\?)/i);

      if (!match) continue; // ❌ skip broken entries

      const title = item.title.replace(" - Manga", "");

      if (seen.has(title)) continue; // ❌ remove duplicates
      seen.add(title);

      let status = match[1];
      let current = parseInt(match[2]);
      let total = match[3] === "?" ? 0 : parseInt(match[3]);

      let percent = total > 0 ? (current / total) * 100 : 0;

      const color = statusColors[status] || "#8b949e";

      // cover
      const idMatch = item.link.match(/manga\/(\d+)/);
      let image = "";

      if (idMatch) {
        try {
          const jikanRes = await fetch(`https://api.jikan.moe/v4/manga/${idMatch[1]}`);
          const jikanData = await jikanRes.json();
          image = jikanData.data?.images?.jpg?.image_url || "";
        } catch {}
      }

      if (!image) {
        image = "https://dummyimage.com/50x70/1f2630/aaa&text=No+Image";
      }

      const div = document.createElement("div");
      div.className = "item";
      div.style.setProperty("--color", color);

      div.innerHTML = `
        <img class="cover" src="${image}"
          onerror="this.onerror=null;this.src='https://dummyimage.com/50x70/1f2630/aaa&text=No+Image';">

        <div class="content">
          <a href="${item.link}" target="_blank" class="title">
            ${title}
          </a>

          <div class="meta">
            ${status} • ${current}${total ? "/" + total : ""}
          </div>
        </div>

        <div class="progress">
          <div class="progress-inner" style="width:${percent}%"></div>
        </div>
      `;

      container.appendChild(div);

      count++;
      if (count >= 8) break;
    }

  } catch (err) {
    container.innerHTML = "⚠️ Error loading feed";
    console.error(err);
  }

});
</script>

</body>
</html>
