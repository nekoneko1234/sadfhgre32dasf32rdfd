<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #0f1117;
  color: #e6edf3;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

#feed {
  display: flex;
  flex-direction: column;
}

/* row */
.item {
  display: flex;
  gap: 12px;
  padding: 12px;
  position: relative;
  background: linear-gradient(90deg, #0f1722, #111827);
  border-bottom: 1px solid #1f2933;
}

/* left status bar */
.item::before {
  content: "";
  position: absolute;
  left: 0;
  top: 6px;
  bottom: 6px;
  width: 5px;
  border-radius: 6px;
  background: var(--color);
}

/* cover */
.cover {
  width: 48px;
  height: 68px;
  border-radius: 6px;
  object-fit: cover;
}

/* content */
.content {
  flex: 1;
}

/* title */
.title {
  font-size: 14px;
  font-weight: 600;
  color: #8ab4f8;
  text-decoration: none;
}

/* meta */
.meta {
  font-size: 12px;
  color: #9aa4b2;
}

/* progress bar */
.progress {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 3px;
  background: #2a2f36;
}

.progress-inner {
  height: 100%;
  background: var(--color);
}

@media (max-width: 400px) {
  .cover {
    width: 40px;
    height: 56px;
  }
}
</style>
</head>

<body>

<div id="feed">Loading...</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  const container = document.getElementById("feed");

  const rss = "https://myanimelist.net/rss.php?type=rm&u=nekoneko1234";
  const api = "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(rss);

  const statusColors = {
    "Reading": "#2ea043",
    "Completed": "#1f6feb",
    "On-Hold": "#d29922",
    "Dropped": "#f85149",
    "Plan to Read": "#8b949e"
  };

  try {
    const res = await fetch(api);
    const data = await res.json();

    container.innerHTML = "";

    for (const item of data.items.slice(0, 8)) {

      const title = item.title.replace(" - Manga", "");

      // 🔥 THIS IS THE IMPORTANT FIX
      const desc = item.description;

      // Extract: "Reading - 14 of 95 chapters"
      const match = desc.match(/(Reading|Completed|On-Hold|Dropped|Plan to Read)\s*-\s*(\d+)\s*of\s*(\d+|\?)/i);

      let status = "Reading";
      let current = 0;
      let total = 0;

      if (match) {
        status = match[1];
        current = parseInt(match[2]);
        total = match[3] === "?" ? 0 : parseInt(match[3]);
      }

      let percent = 0;
      if (total > 0) {
        percent = (current / total) * 100;
      }

      const color = statusColors[status] || "#8b949e";

      // MAL ID → cover
      const idMatch = item.link.match(/manga\/(\d+)/);
      let image = "";

      if (idMatch) {
        try {
          const jikanRes = await fetch(`https://api.jikan.moe/v4/manga/${idMatch[1]}`);
          const jikanData = await jikanRes.json();
          image = jikanData.data?.images?.jpg?.image_url || "";
        } catch {}
      }

      if (!image) {
        image = "https://dummyimage.com/50x70/1f2630/aaa&text=No+Image";
      }

      const div = document.createElement("div");
      div.className = "item";
      div.style.setProperty("--color", color);

      div.innerHTML = `
        <img class="cover" src="${image}"
          onerror="this.onerror=null;this.src='https://dummyimage.com/50x70/1f2630/aaa&text=No+Image';">

        <div class="content">
          <a href="${item.link}" target="_blank" class="title">
            ${title}
          </a>

          <div class="meta">
            ${status} • ${current}${total ? "/" + total : ""}
          </div>
        </div>

        <div class="progress">
          <div class="progress-inner" style="width:${percent}%"></div>
        </div>
      `;

      container.appendChild(div);
    }

  } catch (err) {
    container.innerHTML = "⚠️ Error loading feed";
    console.error(err);
  }

});
</script>

</body>

<body>

<div id="feed">Loading...</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  const container = document.getElementById("feed");

  const rss = "https://myanimelist.net/rss.php?type=rm&u=nekoneko1234";
  const api = "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(rss);

  const statusColors = {
    "Reading": "#2ea043",
    "Completed": "#1f6feb",
    "On-Hold": "#d29922",
    "Dropped": "#f85149",
    "Plan to Read": "#8b949e"
  };

  try {
    const res = await fetch(api);
    const data = await res.json();

    container.innerHTML = "";

    for (const item of data.items.slice(0, 8)) {

      const rawTitle = item.title.replace(" - Manga", "");

      let status = "Reading";
      let progressText = "";

      if (rawTitle.includes("(")) {
        status = rawTitle.split("(")[1].replace(")", "").trim();
      }

      const progressMatch = rawTitle.match(/(\d+\/\d+)/);
      if (progressMatch) progressText = progressMatch[1];

      const cleanTitle = rawTitle.replace(/\(.+\)/, "").trim();

      // MAL ID
      const idMatch = item.link.match(/manga\/(\d+)/);
      let image = "";

      if (idMatch) {
        try {
          const jikanRes = await fetch(`https://api.jikan.moe/v4/manga/${idMatch[1]}`);
          const jikanData = await jikanRes.json();
          image = jikanData.data?.images?.jpg?.image_url || "";
        } catch {}
      }

      if (!image) {
        image = "https://dummyimage.com/50x70/1f2630/aaa&text=No+Image";
      }

      // progress calc
      let progressPercent = 0;
      if (progressText.includes("/")) {
        const [cur, total] = progressText.split("/").map(Number);
        if (total > 0) progressPercent = (cur / total) * 100;
      }

      const color = statusColors[status] || "#8b949e";

      const div = document.createElement("div");
      div.className = "item";
      div.style.setProperty("--color", color);

      div.innerHTML = `
        <img class="cover" src="${image}"
          onerror="this.onerror=null;this.src='https://dummyimage.com/50x70/1f2630/aaa&text=No+Image';">

        <div class="content">
          <a href="${item.link}" target="_blank" class="title">
            ${cleanTitle}
          </a>

          <div class="meta">
            ${status} ${progressText ? "• " + progressText : ""}
          </div>
        </div>

        <div class="progress">
          <div class="progress-inner" style="width:${progressPercent}%"></div>
        </div>
      `;

      container.appendChild(div);
    }

  } catch (err) {
    container.innerHTML = "⚠️ Error loading feed";
    console.error(err);
  }

});
</script>

</body>
