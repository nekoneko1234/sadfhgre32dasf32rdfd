<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #0f1117;
  color: #e6edf3;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* container */
#feed {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* item */
.item {
  display: flex;
  gap: 10px;
  padding: 10px;
  border-radius: 10px;
  background: #161b22;
  align-items: center;
  position: relative;
  overflow: hidden;
}

/* left color bar */
.item::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 4px;
}

/* cover */
.cover {
  width: 50px;
  height: 70px;
  border-radius: 6px;
  object-fit: cover;
  flex-shrink: 0;
}

/* content */
.content {
  flex: 1;
  min-width: 0;
}

.title {
  font-size: 13px;
  font-weight: 600;
  color: #8ab4f8;
  text-decoration: none;
  display: block;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.meta {
  font-size: 11px;
  color: #9aa4b2;
  margin-top: 4px;
}

/* progress bar */
.progress {
  height: 4px;
  background: #30363d;
  border-radius: 999px;
  margin-top: 6px;
  overflow: hidden;
}

.progress-inner {
  height: 100%;
  border-radius: 999px;
}

/* responsive scaling */
@media (max-width: 400px) {
  .cover {
    width: 40px;
    height: 56px;
  }

  .title {
    font-size: 12px;
  }
}
</style>
</head>

<body>

<div id="feed">Loading...</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  const container = document.getElementById("feed");

  const rss = "https://myanimelist.net/rss.php?type=rm&u=nekoneko1234";
  const api = "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(rss);

  const statusColors = {
    "Reading": "#2ea043",
    "Completed": "#1f6feb",
    "On-Hold": "#d29922",
    "Dropped": "#f85149",
    "Plan to Read": "#8b949e"
  };

  try {
    const res = await fetch(api);
    const data = await res.json();

    container.innerHTML = "";

    for (const item of data.items.slice(0, 8)) {

      const rawTitle = item.title.replace(" - Manga", "");

      // Extract status + progress
      let status = "Reading";
      let progressText = "";

      if (rawTitle.includes("(")) {
        const parts = rawTitle.split("(");
        status = parts[1].replace(")", "").trim();
      }

      const progressMatch = rawTitle.match(/(\d+\/\d+)/);
      if (progressMatch) progressText = progressMatch[1];

      const cleanTitle = rawTitle.replace(/\(.+\)/, "").trim();

      // MAL ID
      const idMatch = item.link.match(/manga\/(\d+)/);
      let image = "";

      if (idMatch) {
        try {
          const jikanRes = await fetch(`https://api.jikan.moe/v4/manga/${idMatch[1]}`);
          const jikanData = await jikanRes.json();
          image = jikanData.data?.images?.jpg?.image_url || "";
        } catch {}
      }

      if (!image) {
        image = "https://dummyimage.com/50x70/1f2630/aaa&text=No+Image";
      }

      // progress %
      let progressPercent = 0;
      if (progressText.includes("/")) {
        const [cur, total] = progressText.split("/").map(Number);
        if (total > 0) progressPercent = (cur / total) * 100;
      }

      const color = statusColors[status] || "#8b949e";

      const div = document.createElement("div");
      div.className = "item";
      div.style.setProperty("--color", color);
      div.style.borderLeft = `4px solid ${color}`;

      div.innerHTML = `
        <img class="cover" src="${image}"
          onerror="this.onerror=null;this.src='https://dummyimage.com/50x70/1f2630/aaa&text=No+Image';">

        <div class="content">
          <a href="${item.link}" target="_blank" class="title">
            ${cleanTitle}
          </a>

          <div class="meta">
            ${status} ${progressText ? "• " + progressText : ""}
          </div>

          <div class="progress">
            <div class="progress-inner" 
                 style="width:${progressPercent}%; background:${color};">
            </div>
          </div>
        </div>
      `;

      container.appendChild(div);
    }

  } catch (err) {
    container.innerHTML = "⚠️ Error loading feed";
    console.error(err);
  }

});
</script>

</body>
</html>
