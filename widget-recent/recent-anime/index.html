<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #0f1117;
  color: #e6edf3;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

#feed {
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding: 8px;
}

.item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.cover {
  width: 50px;
  height: 70px;
  border-radius: 4px;
  object-fit: cover;
}

.main {
  flex: 1;
  min-width: 0;
}

.title {
  font-size: 14px;
  font-weight: 600;
  color: #8ab4f8;
  text-decoration: none;
  margin-bottom: 4px;
  display: block;
}

.progress {
  height: 6px;
  background: #2a2f36;
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 6px;
}

.progress-inner {
  height: 100%;
}

.meta {
  font-size: 12px;
  color: #9aa4b2;
}

.time {
  font-size: 12px;
  color: #9aa4b2;
  white-space: nowrap;
}

/* colors */
.green { background: #2ea043; }
.blue { background: #1f6feb; }
.yellow { background: #d29922; }
.red { background: #f85149; }
.gray { background: #8b949e; }

@media (max-width: 420px) {
  .cover {
    width: 42px;
    height: 60px;
  }
}
</style>
</head>

<body>

<div id="feed">Loading...</div>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #191919;
  color: #e6edf3;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

#feed {
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding: 8px;
}

.item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.cover {
  width: 50px;
  height: 70px;
  border-radius: 4px;
  object-fit: cover;
}

.main {
  flex: 1;
  min-width: 0;
}

.title {
  font-size: 14px;
  font-weight: 600;
  color: #8ab4f8;
  text-decoration: none;
  margin-bottom: 4px;
  display: block;
}

.progress {
  height: 6px;
  background: #2a2f36;
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 6px;
}

.progress-inner {
  height: 100%;
}

.meta {
  font-size: 12px;
  color: #9e9e9e;
}

.time {
  font-size: 12px;
  color: #9aa4b2;
  white-space: nowrap;
}

/* MAL colors */
.green { background: #2ea043; }   /* Watching */
.blue { background: #1f6feb; }    /* Completed */
.yellow { background: #d29922; }  /* On-Hold */
.red { background: #f85149; }     /* Dropped */
.gray { background: #8b949e; }    /* Plan */

@media (max-width: 420px) {
  .cover {
    width: 42px;
    height: 60px;
  }

  .title {
    font-size: 13px;
  }
}
</style>
</head>

<body>

<div id="feed">Loading...</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  const container = document.getElementById("feed");

  const rss = "https://myanimelist.net/rss.php?type=rw&u=nekoneko1234";
  const api = "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(rss);

  const statusColorClass = {
    "Watching": "green",
    "Completed": "blue",
    "On-Hold": "yellow",
    "Dropped": "red",
    "Plan to Watch": "gray"
  };

  try {
    const res = await fetch(api);
    const data = await res.json();

    container.innerHTML = "";

    const seen = new Set();
    let count = 0;

    for (const item of data.items) {

      const desc = item.description;

      const match = desc.match(/(Watching|Completed|On-Hold|Dropped|Plan to Watch)\s*-\s*(\d+)\s*of\s*(\d+|\?)/i);
      if (!match) continue;

      const title = item.title.replace(" - TV", "").replace(" - Movie", "").replace(" - OVA", "").replace(" - Special", "");

      if (seen.has(title)) continue;
      seen.add(title);

      const status = match[1];
      const current = parseInt(match[2]);
      const total = match[3] === "?" ? 0 : parseInt(match[3]);

      const percent = total > 0 ? (current / total) * 100 : 0;
      const colorClass = statusColorClass[status] || "gray";

      // ✅ correct time (no timezone hacks)
      const pub = new Date(item.pubDate);
      const now = new Date();
      const diff = (now - pub) / 1000;

      let timeText;

      if (diff < 3600) {
        const min = Math.floor(diff / 60);
        timeText = min <= 1 ? "Just now" : `${min} minutes ago`;
      } else if (diff < 86400) {
        const hours = Math.floor(diff / 3600);
        timeText = `${hours} hours ago`;
      } else {
        timeText = pub.toLocaleDateString("en-US", {
          month: "short",
          day: "numeric"
        });
      }

      // cover via Jikan
      const idMatch = item.link.match(/anime\/(\d+)/);
      let image = "";

      if (idMatch) {
        try {
          const jikanRes = await fetch(`https://api.jikan.moe/v4/anime/${idMatch[1]}`);
          const jikanData = await jikanRes.json();
          image = jikanData.data?.images?.jpg?.image_url || "";
        } catch {}
      }

      if (!image) {
        image = "https://dummyimage.com/50x70/1f2630/aaa&text=No+Image";
      }

      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <img class="cover" src="${image}"
          onerror="this.onerror=null;this.src='https://dummyimage.com/50x70/1f2630/aaa&text=No+Image';">

        <div class="main">
          <a href="${item.link}" target="_blank" class="title">
            ${title}
          </a>

          <div class="progress">
            <div class="progress-inner ${colorClass}" style="width:${percent}%"></div>
          </div>

          <div class="meta">
            ${status} ${total ? current + "/" + total : ""}
          </div>
        </div>

        <div class="time">
          ${timeText}
        </div>
      `;

      container.appendChild(div);

      count++;
      if (count >= 8) break;
    }

  } catch (err) {
    container.innerHTML = "⚠️ Error loading feed";
    console.error(err);
  }

});
</script>

</body>
</html>

</body>
</html>
