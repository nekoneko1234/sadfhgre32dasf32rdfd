<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MangaDex Widget</title>

<style>
body {
  background: #0f1115;
  color: white;
  font-family: Arial;
  margin: 0;
}

h2 {
  margin: 20px;
}

/* container */
.container {
  display: flex;
  overflow-x: auto;
  gap: 15px;
  padding: 20px;
}

/* scrollbar */
.container::-webkit-scrollbar {
  height: 8px;
}
.container::-webkit-scrollbar-thumb {
  background: #444;
  border-radius: 10px;
}

/* card */
.card {
  width: 150px;
  flex-shrink: 0;
  cursor: pointer;
  transition: transform 0.2s;
}

.card:hover {
  transform: scale(1.08);
}

/* image */
.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 8px;
  background: #222;
}

/* title (FIXED WRAP) */
.title {
  font-size: 13px;
  margin-top: 6px;
  color: #ddd;
  line-height: 1.3;

  display: -webkit-box;
  -webkit-line-clamp: 2;   /* max 2 lines */
  -webkit-box-orient: vertical;
  overflow: hidden;
}
</style>
</head>

<body>

<h2>Recommended</h2>
<div class="container" id="manga-container"></div>

<script>
async function loadManga() {
  const proxy = "https://plain-tree-92c5.negimanosensei.workers.dev/?url=";

  // 🔥 Hybrid: popular + random (feels like recommended)
  const offset = Math.floor(Math.random() * 200);

  const api = `https://api.mangadex.org/manga?limit=10&offset=${offset}&order[followedCount]=desc&includes[]=cover_art`;

  try {
    const res = await fetch(proxy + encodeURIComponent(api));
    const json = await res.json();

    const container = document.getElementById("manga-container");
    container.innerHTML = "";

    json.data.forEach(manga => {
      const title = Object.values(manga.attributes.title)[0];

      const coverRel = manga.relationships.find(r => r.type === "cover_art");
      if (!coverRel || !coverRel.attributes) return;

      const fileName = coverRel.attributes.fileName;

      // ✅ proxy image (fix hotlink issue)
      const rawCover = `https://uploads.mangadex.org/covers/${manga.id}/${fileName}`;
      const coverUrl = proxy + encodeURIComponent(rawCover);

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <img src="${coverUrl}" />
        <div class="title">${title}</div>
      `;

      div.onclick = () => {
        window.open(`https://mangadex.org/title/${manga.id}`, "_blank");
      };

      container.appendChild(div);
    });

  } catch (err) {
    console.error("Error:", err);
  }
}

// 🚀 load once
loadManga();

// ⏱️ update every 12 hours
setInterval(loadManga, 43200000);
</script>

</body>
</html>
