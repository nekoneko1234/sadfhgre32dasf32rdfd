<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MangaDex Widget</title>

<style>
body {
  background: #0f1115;
  color: white;
  font-family: Arial;
}

h2 {
  margin: 20px;
}

.container {
  display: flex;
  overflow-x: auto;
  gap: 15px;
  padding: 20px;
}

.card {
  min-width: 150px;
  cursor: pointer;
}

.card img {
  width: 150px;
  height: 220px;
  object-fit: cover;
  border-radius: 8px;
}

.title {
  font-size: 14px;
  margin-top: 5px;
}
</style>
</head>

<body>

<h2>Recommended</h2>
<div class="container" id="manga-container"></div>

<script>
async function loadManga() {
  const res = await fetch(
  "https://api.allorigins.win/raw?url=" +
  encodeURIComponent("https://api.mangadex.org/manga?limit=10&order[followedCount]=desc&includes[]=cover_art")
);
  const data = await res.json();

  const container = document.getElementById("manga-container");

  data.data.forEach(manga => {
    const title = Object.values(manga.attributes.title)[0];

    const coverRel = manga.relationships.find(r => r.type === "cover_art");
    const fileName = coverRel.attributes.fileName;

    const coverUrl = `https://mangadex.org/covers/${manga.id}/${fileName}.256.jpg`;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${coverUrl}" />
      <div class="title">${title}</div>
    `;

    container.appendChild(div);
  });
}

loadManga();
</script>

</body>
</html>
