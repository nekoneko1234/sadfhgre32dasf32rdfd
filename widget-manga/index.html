<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MangaDex Widget</title>

  <style>
    body {
      background: #0f1115;
      color: white;
      font-family: sans-serif;
      padding: 20px;
    }

    h2 {
      margin-bottom: 10px;
    }

    .row {
      display: flex;
      overflow-x: auto;
      gap: 16px;
    }

    .card {
      min-width: 140px;
      cursor: pointer;
    }

    .card img {
      width: 140px;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
    }

    .title {
      font-size: 13px;
      margin-top: 6px;
      color: #ccc;
    }
  </style>
</head>

<body>
  <h2>Recommended</h2>
  <div class="row" id="mangaRow"></div>

<script>
async function loadManga() {
  try {
    const res = await fetch("./data.json");
    const data = await res.json();

    const container = document.getElementById("mangaRow");
    container.innerHTML = "";

    data.data.forEach(manga => {
      const coverUrl = `https://uploads.mangadex.org/covers/${manga.id}/${manga.cover}.256.jpg`;

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <img src="${coverUrl}" />
        <div class="title">${manga.title}</div>
      `;

      container.appendChild(div);
    });

  } catch (err) {
    console.error("ERROR:", err);
  }
}

loadManga();
</script>
</body>
</html>
