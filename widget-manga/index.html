<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Manga Widget</title>

  <style>
    body {
      background: #0f1115;
      color: white;
      font-family: sans-serif;
      padding: 20px;
    }

    .row {
      display: flex;
      gap: 16px;
    }

    .card img {
      width: 140px;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
    }

    .title {
      font-size: 13px;
      margin-top: 6px;
    }
  </style>
</head>

<body>
  <h2>Recommended</h2>
  <div class="row" id="mangaRow"></div>

  <script>
    async function loadManga() {
      const res = await fetch("./data.json");
      const data = await res.json();

      const container = document.getElementById("mangaRow");

      data.data.forEach(manga => {

        // ✅ IMPORTANT: correct cover URL
        const coverUrl = `https://uploads.mangadex.org/covers/${manga.id}/${manga.cover}.256.jpg`;

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <img src="${coverUrl}" />
          <div class="title">${manga.title}</div>
        `;

        container.appendChild(div);
      });
    }

    loadManga();
  </script>
</body>
</html>
