<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaDex Notion Widget</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --text-color: #ffffff;
            --card-width: 160px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        h2 { font-size: 1.2rem; margin: 0; font-weight: 600; }

        /* The Horizontal Scroll Container */
        .manga-grid {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 10px;
            scroll-behavior: smooth;
        }

        /* Hide scrollbar for Chrome/Safari */
        .manga-grid::-webkit-scrollbar { display: none; }
        .manga-grid { -ms-overflow-style: none; scrollbar-width: none; }

        .manga-card {
            flex: 0 0 var(--card-width);
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s;
        }

        .manga-card:hover { transform: translateY(-5px); }

        .cover-wrapper {
            width: 100%;
            aspect-ratio: 2 / 3;
            border-radius: 4px;
            overflow: hidden;
            background-color: #222;
            margin-bottom: 8px;
        }

        .cover-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .manga-title {
            font-size: 0.85rem;
            font-weight: 500;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.2;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Recommended</h2>
    </div>

    <div class="manga-grid" id="manga-container">
        </div>

<script>
    async function fetchManga() {
        const container = document.getElementById('manga-container');
        // This helps us verify the code actually updated in your browser
        console.log("Manga Widget v1.2: Starting fetch...");

        const apiUrl = 'https://api.mangadex.org/manga?limit=10&includes[]=cover_art&order[followedCount]=desc';
        
        // Using AllOrigins proxy (it's very stable for MangaDex)
        const proxiedUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`;

        try {
            const response = await fetch(proxiedUrl);
            const data = await response.json();
            
            // AllOrigins wraps the data, so we have to "unwrap" it
            const json = JSON.parse(data.contents);
            
            container.innerHTML = ''; 

            json.data.forEach(manga => {
                const id = manga.id;
                
                // Prioritize original/romanized titles over English
                const title = manga.attributes.title["ja-ro"] || 
                              manga.attributes.title.ja || 
                              Object.values(manga.attributes.title)[0];
                
                const coverItem = manga.relationships.find(rel => rel.type === 'cover_art');
                const fileName = coverItem ? coverItem.attributes.fileName : '';
                const coverUrl = `https://uploads.mangadex.org/covers/${id}/${fileName}.256.jpg`;

                const card = document.createElement('a');
                card.className = 'manga-card';
                card.href = `https://mangadex.org/title/${id}`;
                card.target = '_blank';

                card.innerHTML = `
                    <div class="cover-wrapper">
                        <img src="${coverUrl}" alt="${title}" loading="lazy" onerror="this.src='https://via.placeholder.com/256x384?text=No+Cover'">
                    </div>
                    <div class="manga-title">${title}</div>
                `;
                
                container.appendChild(card);
            });
        } catch (error) {
            console.error("Fetch error:", error);
            container.innerHTML = `<p style="color:#ff6b6b">Error: Try a "Hard Refresh" (Ctrl+F5). If this persists, GitHub hasn't deployed your changes yet.</p>`;
        }
    }

    fetchManga();
</script>
</body>
</html>
