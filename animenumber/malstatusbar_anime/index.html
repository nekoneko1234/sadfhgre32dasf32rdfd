<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Anime Stats</title>

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    background: transparent;
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont,
      "Segoe UI", Helvetica, Arial, sans-serif;
    color: #e5e7eb;
  }

  .container {
    width: 100%;
    background: #191b22; /* flat, no gradient */
    padding: 14px 16px;
  }

  h2 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .top {
    font-size: 13px;
    color: #a1a1aa;
    margin-bottom: 10px;
  }

  .bar {
    display: flex;
    height: 8px;
    overflow: hidden;
    margin-bottom: 12px;
    background: #2a2d35;
  }

  .bar div { height: 100%; }

  .reading { background: #22c55e; }
  .completed { background: #4f6fae; }
  .onhold { background: #facc15; }
  .dropped { background: #ef4444; }
  .plan { background: #6b7280; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 4px 2px;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .row:hover {
    background: #23262d; /* subtle Notion hover */
  }

  .label {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
  }

  .green { background: #22c55e; }
  .blue { background: #4f6fae; }
  .yellow { background: #facc15; }
  .red { background: #ef4444; }
  .gray { background: #6b7280; }

  .right .row {
    cursor: default;
  }

  .right .row:hover {
    background: transparent;
  }

  @media (max-width: 480px) {
    .grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>

<body>

<div class="container">
  <h2>Anime Stats</h2>

  <div class="top">
    Mean Score: <strong id="score">0</strong>
  </div>

  <div class="bar" id="bar"></div>

  <div class="grid">
    <div id="left"></div>
    <div id="right" class="right"></div>
  </div>
</div>

<script>
const username = "nekoneko1234";

const statusLinks = {
  reading: 1,
  completed: 2,
  on_hold: 3,
  dropped: 4,
  plan: 6
};

async function loadAnime() {
  const res = await fetch("https://malstatusbar.negimanosensei.workers.dev");
  const data = await res.json();
  const anime = data.anime;

  document.getElementById("score").innerText = anime.mean_score;

  const total = anime.total_entries;

  const statuses = [
    { key:"reading", label:"Watching", class:"green" },
    { key:"completed", label:"Completed", class:"blue" },
    { key:"on_hold", label:"On-Hold", class:"yellow" },
    { key:"dropped", label:"Dropped", class:"red" },
    { key:"plan", label:"Plan to Watch", class:"gray" }
  ];

  // BAR
  const bar = document.getElementById("bar");
  bar.innerHTML = "";

  statuses.forEach(s => {
    const percent = total ? (anime.status[s.key]/total)*100 : 0;
    const div = document.createElement("div");
    div.className = s.key === "on_hold" ? "onhold" : s.key;
    div.style.width = percent + "%";
    bar.appendChild(div);
  });

  // LEFT
  const left = document.getElementById("left");
  left.innerHTML = "";

  statuses.forEach(s => {
    const row = document.createElement("div");
    row.className = "row";

    row.innerHTML = `
      <div class="label">
        <div class="dot ${s.class}"></div>
        ${s.label}
      </div>
      <div>${anime.status[s.key]}</div>
    `;

    row.onclick = () => {
      const status = statusLinks[s.key];
      window.open(
        `https://myanimelist.net/animelist/${username}?status=${status}`,
        "_blank"
      );
    };

    left.appendChild(row);
  });

  // RIGHT
  document.getElementById("right").innerHTML = `
    <div class="row"><div>Total Entries</div><div>${anime.total_entries}</div></div>
    <div class="row"><div>Episodes</div><div>${anime.totals.episodes}</div></div>
  `;
}

loadAnime();
</script>

</body>
</html>
