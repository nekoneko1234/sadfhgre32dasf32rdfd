<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Anime Stats</title>

<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    height: 100%;
    background: #0f1115;
    font-family: Arial, sans-serif;
    color: #e5e7eb;
  }

  /* CENTER EVERYTHING */
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
  }

  .container {
    width: 100%;
    max-width: 720px;
    background: linear-gradient(145deg, #1a1d24, #151821);
    padding: 18px 20px;
    border-radius: 10px;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.03);
  }

  h2 {
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 8px;
  }

  .top {
    font-size: 14px;
    margin-bottom: 10px;
    color: #cbd5e1;
  }

  .bar {
    display: flex;
    height: 12px;
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 14px;
    background: #22252c;
  }

  .bar div {
    height: 100%;
  }

  .reading { background: #22c55e; }
  .completed { background: #4f6fae; }
  .onhold { background: #facc15; }
  .dropped { background: #ef4444; }
  .plan { background: #6b7280; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .row {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    margin: 4px 0;
  }

  .label {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
  }

  .green { background: #22c55e; }
  .blue { background: #4f6fae; }
  .yellow { background: #facc15; }
  .red { background: #ef4444; }
  .gray { background: #6b7280; }

  /* 📱 MOBILE */
  @media (max-width: 500px) {
    .grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>

<body>

<div class="container">
  <h2>Anime Stats</h2>

  <div class="top">
    Mean Score: <strong id="score">0</strong>
  </div>

  <div class="bar" id="bar"></div>

  <div class="grid">
    <div id="left"></div>
    <div id="right"></div>
  </div>
</div>

<script>
async function loadAnime() {
  const res = await fetch("https://malstatusbar.negimanosensei.workers.dev");
  const data = await res.json();
  const anime = data.anime;

  document.getElementById("score").innerText = anime.mean_score;

  const total = anime.total_entries;

  const statuses = [
    { key:"reading", label:"Watching", class:"green" },
    { key:"completed", label:"Completed", class:"blue" },
    { key:"on_hold", label:"On-Hold", class:"yellow" },
    { key:"dropped", label:"Dropped", class:"red" },
    { key:"plan", label:"Plan to Watch", class:"gray" }
  ];

  // BAR
  const bar = document.getElementById("bar");
  bar.innerHTML = "";

  statuses.forEach(s => {
    const percent = total ? (anime.status[s.key]/total)*100 : 0;
    const div = document.createElement("div");
    div.className = s.key === "on_hold" ? "onhold" : s.key;
    div.style.width = percent + "%";
    bar.appendChild(div);
  });

  // LEFT
  const left = document.getElementById("left");
  left.innerHTML = "";

  statuses.forEach(s => {
    left.innerHTML += `
      <div class="row">
        <div class="label">
          <div class="dot ${s.class}"></div>
          ${s.label}
        </div>
        <div>${anime.status[s.key]}</div>
      </div>`;
  });

  // RIGHT
  document.getElementById("right").innerHTML = `
    <div class="row"><div>Total Entries</div><div>${anime.total_entries}</div></div>
    <div class="row"><div>Episodes</div><div>${anime.totals.episodes}</div></div>
  `;
}

loadAnime();
</script>

</body>
</html>
