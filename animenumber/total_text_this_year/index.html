<!DOCTYPE html>
<html>
<body>

<h2>Total Series Tahun Ini</h2>
<p id="result">Loading...</p>

<script>
async function loadData() {
  try {
    const res = await fetch("https://totaltextthisyear.negimanosensei.workers.dev");
    const data = await res.json();

    document.getElementById("result").textContent = data.total;

  } catch (err) {
    console.error(err);
    document.getElementById("result").textContent = "Error";
  }
}

loadData();
</script>

</body>
</html>
