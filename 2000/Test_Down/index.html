<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Batch Subtitle Downloader</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-2xl w-full bg-gray-800 rounded-lg shadow-2xl p-8 border border-gray-700">
        <h1 class="text-3xl font-bold mb-2 text-center text-red-500">YouTube CC Downloader</h1>
        <p class="text-gray-400 text-sm text-center mb-6">Download transkrip video massal langsung menjadi file .txt bersih</p>
        
        <div class="mb-4">
            <label class="block text-sm font-medium mb-2">Masukkan Tautan YouTube (Satu link per baris):</label>
            <textarea id="urlInput" rows="6" class="w-full bg-gray-900 border border-gray-600 rounded p-3 text-white focus:outline-none focus:border-red-500" placeholder="https://www.youtube.com/watch?v=76SxgXr79G0&#10;https://youtu.be/DWixMsS65gU"></textarea>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium mb-2">Kode Bahasa Sasaran:</label>
            <input type="text" id="langInput" value="id" class="w-full bg-gray-900 border border-gray-600 rounded p-3 text-white focus:outline-none focus:border-red-500" placeholder="Contoh: id, en, ja">
        </div>

        <button onclick="startBatchProcessing()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded transition duration-200 shadow-md">
            Ekstrak Subtitle (.txt)
        </button>

        <div id="statusLog" class="mt-6 space-y-2 text-sm"></div>
    </div>

    <script>
        // CATATAN PENTING: Wajib mengunci alamat dengan tanda trailing slash "/" absolut di ujungnya
        const WORKER_URL = "https://down-sub-fragile.negimanosensei.workers.dev/"; 

        async function startBatchProcessing() {
            const urls = document.getElementById('urlInput').value.split('\n').map(u => u.trim()).filter(u => u);
            const lang = document.getElementById('langInput').value.trim() || 'id';
            const logContainer = document.getElementById('statusLog');
            logContainer.innerHTML = '';

            if (urls.length === 0) {
                alert("Harap masukkan minimal satu URL YouTube yang valid.");
                return;
            }

            for (let i = 0; i < urls.length; i++) {
                const url = urls[i];
                const statusRow = document.createElement('div');
                statusRow.className = "p-3 bg-gray-700 rounded flex justify-between items-center border-l-4 border-yellow-500";
                statusRow.innerHTML = `<span>Memproses [${i+1}/${urls.length}]: ${url}</span><span class="text-yellow-400 animate-pulse font-mono">Fetching...</span>`;
                logContainer.appendChild(statusRow);

                try {
                    const response = await fetch(WORKER_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ videoUrl: url, lang: lang })
                    });

                    const data = await response.json();

                    if (!response.ok || data.error) {
                        throw new Error(data.error || `HTTP Error ${response.status}`);
                    }

                    // Trigger unduhan dokumen teks langsung ke perangkat lokal user
                    const blob = new Blob([data.text], { type: 'text/plain;charset=utf-8' });
                    const downloadLink = document.createElement('a');
                    downloadLink.href = URL.createObjectURL(blob);
                    downloadLink.download = `${data.title}-${lang}.txt`;
                    document.body.appendChild(downloadLink);
                    downloadLink.click();
                    document.body.removeChild(downloadLink);

                    statusRow.className = "p-3 bg-gray-700 rounded flex justify-between items-center border-l-4 border-green-500";
                    statusRow.innerHTML = `<span>✓ Selesai: ${url}</span><span class="text-green-400 font-bold">Downloaded</span>`;
                } catch (err) {
                    statusRow.className = "p-3 bg-gray-700 rounded flex justify-between items-center border-l-4 border-red-500";
                    statusRow.innerHTML = `<span>✕ Gagal: ${url}</span><span class="text-red-400 font-bold">${err.message}</span>`;
                }
            }
        }
    </script>
</body>
</html>
