<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Batch CC Downloader - Fresh Build</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-gray-800 p-8 rounded-xl shadow-2xl border border-gray-700">
        <h1 class="text-3xl font-extrabold text-center text-red-500 mb-2">YT Batch CC Downloader</h1>
        <p class="text-gray-400 text-sm text-center mb-6">Mengekstrak subtitle massal langsung menjadi dokumen teks (.txt).</p>

        <div class="mb-4">
            <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">Masukkan Daftar Link YouTube (Per Baris):</label>
            <textarea id="linksArea" rows="6" class="w-full p-4 bg-gray-700 rounded border border-gray-600 focus:outline-none focus:border-red-500 font-mono text-sm resize-none" placeholder="https://www.youtube.com/watch?v=76SxgXr79G0&#10;https://www.youtube.com/watch?v=DWixMsS65gU"></textarea>
        </div>

        <div class="mb-6">
            <label class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2">Pilih Prioritas Bahasa Subtitle:</label>
            <select id="langSelect" class="w-full p-3 bg-gray-700 rounded border border-gray-600 focus:outline-none focus:border-red-500 text-gray-200">
                <option value="id">Indonesia (id)</option>
                <option value="en">Inggris (en)</option>
                <option value="ja">Jepang (ja)</option>
                <option value="ko">Korea (ko)</option>
                <option value="zh">Mandarin (zh)</option>
            </select>
        </div>

        <button onclick="startDownloadProcess()" id="actionBtn" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-lg shadow transition duration-150">
            Mulai Ambil Subtitle (.txt)
        </button>

        <div id="logSection" class="mt-6 border-t border-gray-700 pt-4 hidden">
            <h3 class="text-sm font-bold text-gray-300 mb-2">Status Antrean:</h3>
            <div id="logQueue" class="space-y-2"></div>
        </div>
    </div>

    <script>
        // Alamat Backend Worker - Sudah Menggunakan Slash Absolut di Akhir URL
        const BACKEND_URL = "https://down-sub-fragile.negimanosensei.workers.dev/";

        async function startDownloadProcess() {
            const inputEl = document.getElementById('linksArea');
            const langEl = document.getElementById('langSelect');
            const btnEl = document.getElementById('actionBtn');
            const logSection = document.getElementById('logSection');
            const logQueue = document.getElementById('logQueue');

            // Pecah dan bersihkan daftar link
            const links = inputEl.value.split('\n').map(str => str.trim()).filter(str => str !== "");
            if (links.length === 0) return alert("Silakan masukkan minimal satu link video YouTube terlebih dahulu.");

            // Tampilkan komponen antrean log
            logQueue.innerHTML = "";
            logSection.classList.remove('hidden');
            btnEl.disabled = true;
            btnEl.className = "w-full bg-gray-600 text-gray-400 font-bold py-3 px-4 rounded-lg cursor-not-allowed";
            btnEl.innerText = "Memproses Daftar Antrean...";

            // Loop Proses Batch Berurutan
            for (let i = 0; i < links.length; i++) {
                const targetLink = links[i];
                
                // Tambahkan baris progress di UI
                const statusRow = document.createElement('div');
                statusRow.className = "text-xs p-3 bg-gray-700 rounded border border-gray-600 flex justify-between items-center";
                statusRow.innerHTML = `<span class="truncate font-mono text-gray-300">${targetLink}</span><span class="text-yellow-500 font-bold animate-pulse">Menghubungkan...</span>`;
                logQueue.appendChild(statusRow);

                try {
                    const response = await fetch(BACKEND_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ videoUrl: targetLink, lang: langEl.value })
                    });
                    
                    const result = await response.json();
                    const stateLabel = statusRow.querySelector('span:last-child');

                    if (result.error) {
                        stateLabel.className = "text-red-400 font-bold";
                        stateLabel.innerText = "Gagal: " + result.error;
                    } else {
                        stateLabel.className = "text-green-400 font-bold";
                        stateLabel.innerText = "Berhasil Terunduh!";
                        
                        // Jalankan trigger download file TXT langsung ke browser pengguna
                        saveFileToDevice(result.title + ".txt", result.text);
                    }
                } catch (err) {
                    const stateLabel = statusRow.querySelector('span:last-child');
                    stateLabel.className = "text-red-500 font-bold";
                    stateLabel.innerText = "Gagal Koneksi";
                }
            }

            // Kembalikan status tombol seperti semula setelah selesai
            btnEl.disabled = false;
            btnEl.className = "w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-lg shadow transition duration-150";
            btnEl.innerText = "Mulai Ambil Subtitle (.txt)";
        }

        function saveFileToDevice(name, content) {
            const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = name;
            link.style.display = "none";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
        }
    </script>
</body>
</html>
