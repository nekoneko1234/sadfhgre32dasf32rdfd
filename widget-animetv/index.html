<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anime Widget</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  font-family: Arial, sans-serif;
  color: #111;
}

@media (prefers-color-scheme: dark) {
  body { color: #e6e6e6; }
}

h2 {
  margin: 20px 24px 0;
  font-size: 18px;
}

.container {
  display: flex;
  overflow-x: auto;
  gap: 18px;
  padding: 20px 24px;
}

.card {
  width: 150px;
  flex-shrink: 0;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 8px;
}

.title {
  font-size: 13px;
  margin-top: 6px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
</style>
</head>

<body>

<h2>Top Anime</h2>
<div class="container" id="top"></div>

<h2>Trending</h2>
<div class="container" id="trending"></div>

<script>
async function loadAnime() {
  try {
    const top = await fetch("https://api.jikan.moe/v4/top/anime").then(r => r.json());
    const trending = await fetch("https://api.jikan.moe/v4/seasons/now").then(r => r.json());

    render("top", top.data);
    render("trending", trending.data);

  } catch (e) {
    console.error("Error:", e);
  }
}

function render(id, list) {
  const el = document.getElementById(id);
  el.innerHTML = "";

  list.slice(0, 12).forEach(a => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${a.images.jpg.image_url}">
      <div class="title">${a.title}</div>
    `;

    div.onclick = () => window.open(a.url, "_blank");

    el.appendChild(div);
  });
}

loadAnime();
</script>

</body>
</html>
