<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anime Recommendation</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #151b23;
  font-family: Arial, sans-serif;
  color: #111;
}

@media (prefers-color-scheme: dark) {
  body { color: #e6e6e6; }
}

h2 {
  margin: 20px 24px 0;
  font-size: 18px;
}

.container {
  display: flex;
  overflow-x: auto;
  gap: 18px;
  padding: 20px 24px;
}

.card {
  width: 150px;
  flex-shrink: 0;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 8px;
}

.title {
  font-size: 13px;
  margin-top: 6px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
</style>
</head>

<body>

<h2>Recommended</h2>
<div class="container" id="row"></div>

<script>
async function loadAnime() {
  try {
    // 🔥 RANDOM OFFSET (changes every refresh)
    const randomPage = Math.floor(Math.random() * 5) + 1;

    // ✅ 1. TOP (stable quality)
    const topRes = await fetch("https://api.jikan.moe/v4/top/anime");
    const topJson = await topRes.json();
    const top = topJson.data.slice(0, 5);

    // ✅ 2. RANDOM (different every time)
    const randomRes = await fetch(`https://api.jikan.moe/v4/anime?page=${randomPage}`);
    const randomJson = await randomRes.json();
    const random = randomJson.data.slice(0, 5);

    // 🔀 MIX
    let combined = [...top, ...random];

    // 🔀 SHUFFLE
    combined = combined.sort(() => Math.random() - 0.5);

    render(combined);

  } catch (e) {
    console.error("Error:", e);
  }
}

function render(list) {
  const el = document.getElementById("row");
  el.innerHTML = "";

  list.forEach(a => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${a.images.jpg.image_url}">
      <div class="title">${a.title}</div>
    `;

    // 🔥 OPEN ANI WATCH SEARCH
    div.onclick = () => {
      window.open(
        `https://aniwatchtv.to/search?keyword=${encodeURIComponent(a.title)}`,
        "_blank"
      );
    };

    el.appendChild(div);
  });
}

loadAnime();
</script>

</body>
</html>
