<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anime Recommendation</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #151b23;
  font-family: Arial, sans-serif;
  color: #e6e6e6;
}

h2 {
  margin: 20px 24px 0;
  font-size: 18px;
}

.container {
  display: flex;
  overflow-x: auto;
  gap: 18px;
  padding: 20px 24px;
}

.card {
  width: 150px;
  flex-shrink: 0;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 8px;
}

.title {
  font-size: 13px;
  margin-top: 6px;
  line-height: 1.3;

  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
</style>
</head>

<body>

<h2>Recommended</h2>
<div class="container" id="row"></div>

<script>
async function loadAnime() {
  try {
    const [topRes, seasonRes] = await Promise.all([
      fetch("https://api.jikan.moe/v4/top/anime?limit=100"),
      fetch("https://api.jikan.moe/v4/seasons/now")
    ]);

    const top = (await topRes.json()).data;
    const season = (await seasonRes.json()).data;

    // 🔥 1. RANDOM (from all top)
    const randomPool = shuffle([...top]);
    const randomPick = randomPool.slice(0, 4);

    // 🔥 2. POPULAR (top 100 but randomized)
    const popularPool = shuffle([...top]);
    const popularPick = popularPool.slice(10, 14); // avoid overlap with random

    // 🔥 3. LATEST (season)
    const latestPool = shuffle([...season]);
    const latestPick = latestPool.slice(0, 4);

    // 🔥 Combine + remove duplicates
    const combined = uniqueById([
      ...randomPick,
      ...latestPick,
      ...popularPick
    ]);

    render(combined.slice(0, 12));

  } catch (e) {
    console.error(e);
  }
}

function render(list) {
  const el = document.getElementById("row");
  el.innerHTML = "";

  list.forEach(a => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${a.images.jpg.image_url}">
      <div class="title">${a.title}</div>
    `;

    div.onclick = () => {
      window.open(
        `https://aniwatchtv.to/search?keyword=${encodeURIComponent(a.title)}`,
        "_blank"
      );
    };

    el.appendChild(div);
  });
}

// 🔀 shuffle
function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

// 🚫 remove duplicates
function uniqueById(arr) {
  const seen = new Set();
  return arr.filter(a => {
    if (seen.has(a.mal_id)) return false;
    seen.add(a.mal_id);
    return true;
  });
}

loadAnime();
</script>

</body>
</html>
