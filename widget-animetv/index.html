<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anime Widget</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #151b23;
  font-family: Arial, sans-serif;
  color: #e6e6e6;
}

h2 {
  margin: 20px 24px 0;
  font-size: 18px;
}

.container {
  display: flex;
  overflow-x: auto;
  gap: 18px;
  padding: 20px 24px;
}

.card {
  width: 150px;
  flex-shrink: 0;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 8px;
}

.title {
  font-size: 13px;
  margin-top: 6px;

  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
</style>
</head>

<body>

<h2>Recommended</h2>
<div class="container" id="row"></div>

<script>
async function loadAnime() {
  try {
    showLoading();

    // 🔥 random offset (changes every refresh)
    const offset = Math.floor(Math.random() * 100);

    // 🔥 fetch all sources in parallel
    const [topRes, seasonRes] = await Promise.all([
      fetch(`https://api.jikan.moe/v4/top/anime?limit=25&page=${Math.floor(offset/25)+1}`),
      fetch("https://api.jikan.moe/v4/seasons/now")
    ]);

    const topJson = await topRes.json();
    const seasonJson = await seasonRes.json();

    const topList = topJson.data || [];
    const seasonList = seasonJson.data || [];

    // 🔥 pick groups
    const popular = shuffle(topList).slice(0, 4);
    const random = shuffle(topList).slice(10, 14);
    const latest = shuffle(seasonList).slice(0, 4);

    // 🔥 combine + remove duplicates
    const combined = uniqueById([...popular, ...random, ...latest]);

    render(combined.slice(0, 12));

  } catch (e) {
    console.error("Error:", e);
    showError();
  }
}

function render(list) {
  const el = document.getElementById("row");
  el.innerHTML = "";

  list.forEach(a => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${a.images.jpg.image_url}" loading="lazy">
      <div class="title">${a.title}</div>
    `;

    div.onclick = () => window.open(a.url, "_blank");

    el.appendChild(div);
  });
}

// 🔧 helpers

function shuffle(arr) {
  return arr.sort(() => 0.5 - Math.random());
}

function uniqueById(arr) {
  const seen = new Set();
  return arr.filter(item => {
    if (seen.has(item.mal_id)) return false;
    seen.add(item.mal_id);
    return true;
  });
}

// UI states

function showLoading() {
  document.getElementById("row").innerHTML =
    "<p style='opacity:0.6;padding:20px'>Loading...</p>";
}

function showError() {
  document.getElementById("row").innerHTML =
    "<p style='color:red;padding:20px'>Failed to load</p>";
}

// run
loadAnime();
</script>

</body>
</html>
