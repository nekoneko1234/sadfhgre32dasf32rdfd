<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Number Generator</title>
  <style>
    :root {
      --bg-color: #1e1e1e;
      --text-color: #ffffff;
      --accent-color: #ffffff; /* monotone white accent */
    }

    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
      box-sizing: border-box;
    }

    .container {
      width: 100%;
      max-width: 600px;
      text-align: center;
    }

    h1 {
      font-size: clamp(1.2rem, 2vw, 1.6rem);
      margin-bottom: 2rem;
      color: var(--accent-color);
      font-weight: 500;
    }

    .inputs {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    label {
      font-size: 0.9rem;
      margin-bottom: 0.3rem;
      color: var(--accent-color);
    }

    input {
      width: 100px;
      padding: 0.5rem;
      background: transparent;
      border: 1px solid var(--accent-color);
      border-radius: 6px;
      color: var(--text-color);
      text-align: center;
      font-size: 1rem;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    button {
      flex: 1;
      min-width: 120px;
      padding: 0.7rem;
      border: 1px solid var(--accent-color);
      border-radius: 6px;
      background: transparent;
      color: var(--accent-color);
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background: var(--accent-color);
      color: var(--bg-color);
    }

    .result {
      font-size: clamp(1.5rem, 5vw, 3rem);
      font-weight: bold;
      color: var(--accent-color);
      word-wrap: break-word;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Random Number Generator</h1>
    <div class="inputs">
      <div class="input-group">
        <label for="lower">Min</label>
        <input type="number" id="lower" value="1">
      </div>
      <div class="input-group">
        <label for="upper">Max</label>
        <input type="number" id="upper" value="100">
      </div>
    </div>
    <div class="buttons">
      <button onclick="generate()">Generate</button>
      <button onclick="clearResult()">Clear</button>
    </div>
    <div class="result" id="result"></div>
  </div>

  <script>
    function generate() {
      const lower = parseInt(document.getElementById('lower').value);
      const upper = parseInt(document.getElementById('upper').value);
      if (isNaN(lower) || isNaN(upper) || lower >= upper) {
        document.getElementById('result').textContent = "Invalid range";
        return;
      }
      const randomNum = Math.floor(Math.random() * (upper - lower + 1)) + lower;
      document.getElementById('result').textContent = randomNum;
    }

    function clearResult() {
      document.getElementById('result').textContent = "";
    }
  </script>
</body>
</html>
