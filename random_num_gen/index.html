<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Random Number Generator</title>
    <style>
        :root {
            /* Using transparent background so it looks native to your Notion page */
            --text-primary: #ffffff; 
            --text-secondary: #a7a7a7;
            --accent: #2eaadc;
            --input-bg: #252525;
            --border: #373737;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: transparent; 
            color: var(--text-primary);
            overflow: hidden; /* Prevents scrollbars in small embeds */
            padding: 10px;
        }

        /* Removed the card background and centering for a cleaner Notion look */
        .wrapper {
            width: 100%;
            max-width: 350px;
            margin: 0 auto;
            text-align: center;
        }

        h2 {
            font-size: 1rem;
            margin-bottom: 16px;
            font-weight: 500;
            letter-spacing: -0.02em;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .input-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-align: left;
            padding-left: 2px;
        }

        input {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: white;
            padding: 8px;
            text-align: center;
            font-size: 1rem;
            width: 100%;
        }

        .button-row {
            display: flex;
            gap: 8px;
        }

        button {
            flex: 1;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        #result {
            margin-top: 16px;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <h2>Random Number Generator</h2>
    
    <div class="input-row">
        <div class="input-group">
            <label>Min</label>
            <input type="number" id="min" value="1">
        </div>
        <div class="input-group">
            <label>Max</label>
            <input type="number" id="max" value="100">
        </div>
    </div>

    <div class="button-row">
        <button onclick="gen()">Generate</button>
        <button onclick="clr()">Clear</button>
    </div>

    <div id="result"></div>
</div>

<script>
    function gen() {
        const min = parseInt(document.getElementById('min').value);
        const max = parseInt(document.getElementById('max').value);
        const res = document.getElementById('result');
        if (isNaN(min) || isNaN(max)) return;
        res.innerText = Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function clr() {
        document.getElementById('result').innerText = "";
    }
</script>

</body>
</html>
