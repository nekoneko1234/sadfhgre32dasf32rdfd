<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IG Slideshow</title>

<style>
  body {
    margin: 0;
    background: black;
    font-family: sans-serif;
  }

  .slider {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
  }

  .slide {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .active {
    opacity: 1;
  }

  .controls {
    position: absolute;
    width: 100%;
    top: 50%;
    display: flex;
    justify-content: space-between;
    transform: translateY(-50%);
    z-index: 10;
  }

  button {
    background: rgba(0,0,0,0.4);
    color: white;
    border: none;
    padding: 12px;
    font-size: 18px;
    cursor: pointer;
  }

  .status {
    position: absolute;
    bottom: 10px;
    left: 10px;
    color: white;
    font-size: 12px;
    opacity: 0.7;
  }
</style>
</head>

<body>

<div class="slider" id="slider">
  <div class="status" id="status">Loading...</div>
</div>

<div class="controls">
  <button onclick="prevSlide()">⟨</button>
  <button onclick="nextSlide()">⟩</button>
</div>

<script>
const API_URL = "https://test-slide-show-ig.negimanosensei.workers.dev/";

// 🔥 fallback images (always works)
const fallbackImages = [
  "https://picsum.photos/800/1200?random=1",
  "https://picsum.photos/800/1200?random=2",
  "https://picsum.photos/800/1200?random=3",
  "https://picsum.photos/800/1200?random=4"
];

let images = [];
let slides = [];
let current = 0;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function initSlider() {
  const slider = document.getElementById("slider");
  slider.innerHTML = '<div class="status" id="status"></div>';

  images.forEach((src, index) => {
    const div = document.createElement("div");
    div.classList.add("slide");
    if (index === 0) div.classList.add("active");

    div.innerHTML = `<img src="${src}" loading="lazy">`;
    slider.appendChild(div);
  });

  slides = document.querySelectorAll(".slide");

  setInterval(nextSlide, 4000);
}

function showSlide(index) {
  slides[current].classList.remove("active");
  current = (index + slides.length) % slides.length;
  slides[current].classList.add("active");
}

function nextSlide() {
  showSlide(current + 1);
}

function prevSlide() {
  showSlide(current - 1);
}

// 🚀 LOAD IMAGES
async function loadImages() {
  const status = document.getElementById("status");

  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    if (!data || data.length === 0) {
      status.innerText = "Using fallback images";
      images = fallbackImages;
    } else {
      status.innerText = "Loaded from API";
      images = data;
    }

  } catch (err) {
    console.error(err);
    status.innerText = "API failed → fallback";
    images = fallbackImages;
  }

  shuffle(images);
  initSlider();
}

loadImages();
</script>

</body>
</html>
