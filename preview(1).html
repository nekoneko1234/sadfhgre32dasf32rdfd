<!DOCTYPE html>
<html>
<body style="background:#0f1117;color:#e6edf3;font-family:sans-serif;padding:12px;">

<h3>📚 Recent Updates</h3>
<div id="feed">Loading...</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  const container = document.getElementById("feed");

  const rss = "https://myanimelist.net/rss.php?type=rm&u=nekoneko1234";
  const api = "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(rss);

  try {
    const res = await fetch(api);
    const data = await res.json();

    if (!data.items) {
      container.innerHTML = "⚠️ Failed to load feed";
      return;
    }

    container.innerHTML = "";

    for (const item of data.items.slice(0,6)) {

      const title = item.title.replace(" - Manga", "");

      // ✅ Extract MAL ID (KEY FIX)
      const idMatch = item.link.match(/manga\/(\d+)/);
      let image = "";

      if (idMatch) {
        const malId = idMatch[1];

        try {
          const jikanRes = await fetch(`https://api.jikan.moe/v4/manga/${malId}`);
          const jikanData = await jikanRes.json();
          image = jikanData.data?.images?.jpg?.image_url || "";
        } catch {}
      }

      // ✅ Fallback image (important for Notion)
      if (!image) {
        image = "https://dummyimage.com/50x70/1f2630/aaa&text=No+Image";
      }

      const div = document.createElement("div");
      div.style.display = "flex";
      div.style.gap = "10px";
      div.style.marginBottom = "12px";
      div.style.padding = "10px";
      div.style.borderRadius = "10px";
      div.style.background = "#161b22";
      div.style.alignItems = "center";

      div.innerHTML = `
        <img src="${image}" 
             onerror="this.onerror=null;this.src='https://dummyimage.com/50x70/1f2630/aaa&text=No+Image';"
             style="width:50px;height:70px;border-radius:6px;object-fit:cover;">

        <div style="flex:1;">
          <a href="${item.link}" target="_blank" 
             style="color:#8ab4f8;font-size:13px;font-weight:600;text-decoration:none;">
            ${title}
          </a>

          <div style="font-size:11px;color:#9aa4b2;margin-top:4px;">
            ${new Date(item.pubDate).toLocaleDateString()}
          </div>
        </div>
      `;

      container.appendChild(div);
    }

  } catch (err) {
    container.innerHTML = "⚠️ Error loading feed";
    console.error(err);
  }

});
</script>

</body>
</html>
